name: Compatibility report
description: Report a Sol/Terra or macOS/Linux compatibility problem
title: "[Compatibility]: "
labels:
  - compatibility
body:
  - type: markdown
    attributes:
      value: |
        Compatibility support is limited to Sol and Terra on macOS and Linux.

        **Never include API tokens, credentials, authentication files, or private/unredacted logs.** Use private vulnerability reporting for security issues.
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - Sol
        - Terra
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment versions
      description: Provide codex-for-grok, OS, architecture, and relevant client versions.
      placeholder: "codex-for-grok v…, macOS/Linux …, arm64/x86_64, client …"
    validations:
      required: true
  - type: textarea
    id: matrix
    attributes:
      label: Compatibility result
      description: Explain what combination works and what combination fails.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Use placeholders for all credentials and private data.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive-data check
      options:
        - label: I have not included tokens, credentials, authentication files, or private/unredacted logs.
          required: true
