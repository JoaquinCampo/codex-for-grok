name: Feature request
description: Suggest a focused improvement for codex-for-grok
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        codex-for-grok is an unofficial local Rust bridge supporting only Sol and Terra on macOS and Linux. Requests outside that scope may be declined.

        **Never include API tokens, credentials, authentication files, or private/unredacted logs.** Use private vulnerability reporting for security issues.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful solution and whether configuration changes can remain additive and backward-compatible.
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Relevant backend
      options:
        - Sol
        - Terra
        - Both Sol and Terra
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Relevant operating system
      options:
        - macOS
        - Linux
        - Both macOS and Linux
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or simpler alternatives.
  - type: checkboxes
    id: safety
    attributes:
      label: Sensitive-data check
      options:
        - label: I have not included tokens, credentials, authentication files, or private/unredacted logs.
          required: true
