name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo test --all-targets --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo build --release --locked

  native-platforms:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo test --all-targets --locked --target "${{ matrix.target }}"
      - run: cargo build --release --locked --target "${{ matrix.target }}"

  supply-chain:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      - run: cargo deny check
      - run: cargo audit

  release-tools:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: bash -n release/*.sh
      - run: ruby release/validate-yaml.rb
      - name: Validate Homebrew renderer
        run: |
          mkdir -p release/dist
          version=0.0.0
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            file="grok-codex-bridge-$version-$target.tar.gz"
            printf '%064d  %s\n' 0 "$file" >> release/dist/SHA256SUMS
          done
          release/render-homebrew.sh "$version"
          ruby -c release/dist/grok-codex-bridge.rb
