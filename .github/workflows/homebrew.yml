name: Homebrew handoff

on:
  workflow_dispatch:
    inputs:
      version:
        description: Released version without the v prefix
        required: true
        type: string

permissions:
  contents: read

jobs:
  formula:
    runs-on: ubuntu-24.04
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "v${{ inputs.version }}" --pattern SHA256SUMS --dir release/dist
      - run: release/render-homebrew.sh "${{ inputs.version }}"
      - run: ruby -c release/dist/codex-for-grok.rb
      - uses: actions/upload-artifact@v7
        with:
          name: codex-for-grok-homebrew-formula-${{ inputs.version }}
          path: release/dist/codex-for-grok.rb
      - name: Open tap pull request
        if: env.TAP_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/joaquincampo/homebrew-tap.git" tap
          cd tap
          branch="codex-for-grok-${VERSION}"
          git switch -c "$branch"
          mkdir -p Formula
          cp ../release/dist/codex-for-grok.rb Formula/codex-for-grok.rb
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Formula/codex-for-grok.rb
          git commit -m "codex-for-grok ${VERSION}"
          git push origin "$branch"
          gh pr create --repo joaquincampo/homebrew-tap --head "$branch" --base main \
            --title "codex-for-grok ${VERSION}" \
            --body "Updates the formula from the checksummed upstream release artifacts."
